<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alip Bot - Dashboard Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #3b82f6;
            --dark-bg: #0f172a;
            --card-bg: #1e293b;
            --border-color: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --danger-color: #ef4444;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, var(--dark-bg) 0%, #1a1f3a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-primary);
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .login-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-icon {
            font-size: 48px;
            color: var(--primary-color);
            margin-bottom: 15px;
        }

        .logo h1 {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .logo p {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-primary);
        }

        input {
            width: 100%;
            padding: 12px 15px;
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 14px;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-color);
            background-color: rgba(59, 130, 246, 0.05);
        }

        input::placeholder {
            color: var(--text-secondary);
        }

        .remember-forgot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-size: 13px;
        }

        .remember-forgot a {
            color: var(--primary-color);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .remember-forgot a:hover {
            text-decoration: underline;
        }

        .checkbox {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .checkbox input {
            width: auto;
            cursor: pointer;
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 15px;
        }

        .btn-login:hover {
            background-color: #2563eb;
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(59, 130, 246, 0.4);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .btn-login:disabled {
            background-color: var(--border-color);
            cursor: not-allowed;
            transform: none;
        }

        .divider {
            text-align: center;
            margin: 20px 0;
            color: var(--text-secondary);
            font-size: 12px;
        }

        .divider::before,
        .divider::after {
            content: '';
            display: inline-block;
            width: 40%;
            height: 1px;
            background-color: var(--border-color);
            vertical-align: middle;
        }

        .divider::before {
            margin-right: 10px;
        }

        .divider::after {
            margin-left: 10px;
        }

        .config-section {
            background-color: rgba(255, 255, 255, 0.02);
            border: 1px dashed var(--border-color);
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .config-label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            font-weight: 600;
        }

        .alert {
            padding: 12px 15px;
            border-radius: 6px;
            margin-bottom: 15px;
            display: none;
            border-left: 4px solid;
        }

        .alert.show {
            display: block;
        }

        .alert-error {
            background-color: rgba(239, 68, 68, 0.1);
            color: #fecaca;
            border-left-color: var(--danger-color);
        }

        .alert-success {
            background-color: rgba(16, 185, 129, 0.1);
            color: #86efac;
            border-left-color: #10b981;
        }

        .alert-info {
            background-color: rgba(59, 130, 246, 0.1);
            color: #93c5fd;
            border-left-color: var(--primary-color);
        }

        .footer-text {
            text-align: center;
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 20px;
        }

        .typing {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--primary-color);
            animation: typing 1.4s infinite;
        }

        .typing:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {

            0%,
            60%,
            100% {
                opacity: 0.5;
                transform: translateY(0);
            }

            30% {
                opacity: 1;
                transform: translateY(-10px);
            }
        }

        .loading {
            display: none;
            text-align: center;
        }

        .loading.show {
            display: block;
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <div class="logo-icon">🤖</div>
                <h1>Alip Bot</h1>
                <p>Dashboard Control Panel</p>
            </div>

            <div id="alertBox" class="alert"></div>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Masukkan email Anda" required autocomplete="email">
                </div>

                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Masukkan username Anda" required
                        autocomplete="username">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Masukkan password Anda" required
                        autocomplete="current-password">
                </div>

                <div class="remember-forgot">
                    <label class="checkbox">
                        <input type="checkbox" id="rememberMe">
                        <span>Ingat saya</span>
                    </label>
                    <a href="#" onclick="showConfigModal()">Setup API</a>
                </div>

                <button type="submit" class="btn-login" id="loginBtn">
                    Login
                </button>

                <div class="loading" id="loadingIndicator">
                    <span class="typing"></span>
                    <span class="typing"></span>
                    <span class="typing"></span>
                </div>
            </form>

            <div class="divider">atau</div>

            <div class="config-section">
                <div class="config-label">📡 API Configuration</div>
                <input type="text" id="apiUrl" placeholder="http://localhost:3000/api" style="margin-bottom: 8px;">
                <small style="color: var(--text-secondary); display: block;">
                    Konfigurasi otomatis tersimpan di browser Anda
                </small>
            </div>

            <div class="footer-text">
                <p>Alip Bot v10.5.0</p>
                <p style="margin-top: 8px;">© 2025 - @alipclutch</p>
            </div>
        </div>
    </div>

    <!-- Config Modal -->
    <div id="configModal"
        style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; display: flex; align-items: center; justify-content: center;">
        <div
            style="background: var(--card-bg); padding: 30px; border-radius: 12px; border: 1px solid var(--border-color); max-width: 400px; width: 90%;">
            <h2 style="margin-bottom: 20px;">Setup API Configuration</h2>

            <div class="form-group">
                <label for="configApiUrl">API Base URL</label>
                <input type="text" id="configApiUrl" placeholder="http://localhost:3000/api">
            </div>

            <div class="form-group">
                <label for="configPassword">Dashboard Password</label>
                <input type="password" id="configPassword" placeholder="Masukkan password baru">
            </div>

            <div class="form-group">
                <label for="configPasswordConfirm">Confirm Password</label>
                <input type="password" id="configPasswordConfirm" placeholder="Confirm password">
            </div>

            <div style="display: flex; gap: 10px;">
                <button onclick="saveConfig()"
                    style="flex: 1; padding: 10px; background: var(--primary-color); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 600;">
                    Simpan
                </button>
                <button onclick="closeConfigModal()"
                    style="flex: 1; padding: 10px; background: var(--border-color); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 600;">
                    Batal
                </button>
            </div>
        </div>
    </div>

    <script>
        // Load saved API URL on page load
        window.addEventListener('DOMContentLoaded', () => {
            const savedApiUrl = localStorage.getItem('apiUrl');
            const savedEmail = localStorage.getItem('userEmail');
            const savedUsername = localStorage.getItem('userUsername');
            const savedPassword = localStorage.getItem('dashboardPassword');

            if (savedApiUrl) {
                document.getElementById('apiUrl').value = savedApiUrl;
            }

            if (savedEmail) {
                document.getElementById('email').value = savedEmail;
            }

            if (savedUsername) {
                document.getElementById('username').value = savedUsername;
            }

            if (savedPassword) {
                document.getElementById('rememberMe').checked = true;
                document.getElementById('password').value = savedPassword;
            }

            // Check if already logged in
            const token = localStorage.getItem('dashboardToken');
            if (token) {
                window.location.href = 'dashboard.html';
            }
        });

        async function handleLogin(event) {
            event.preventDefault();

            const email = document.getElementById('email').value;
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('rememberMe').checked;
            const apiUrl = document.getElementById('apiUrl').value;

            if (!email) {
                showAlert('Masukkan email', 'error');
                return;
            }

            if (!username) {
                showAlert('Masukkan username', 'error');
                return;
            }

            if (!password) {
                showAlert('Masukkan password', 'error');
                return;
            }

            if (!apiUrl) {
                showAlert('Konfigurasi API URL terlebih dahulu', 'error');
                return;
            }

            try {
                showLoading(true);

                // Save API URL
                localStorage.setItem('apiUrl', apiUrl);
                localStorage.setItem('userEmail', email);
                localStorage.setItem('userUsername', username);

                // Attempt login
                const response = await fetch(`${apiUrl}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email,
                        username,
                        password
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.message || 'Login failed');
                }

                // Save token and user info
                localStorage.setItem('dashboardToken', data.token);
                localStorage.setItem('userName', data.userName || username);

                if (rememberMe) {
                    localStorage.setItem('dashboardPassword', password);
                } else {
                    localStorage.removeItem('dashboardPassword');
                }

                showAlert('Login berhasil! Redirecting...', 'success');

                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1000);

            } catch (error) {
                console.error('Login error:', error);
                showAlert(error.message || 'Login gagal', 'error');
            } finally {
                showLoading(false);
            }
        }

        function showAlert(message, type) {
            const alertBox = document.getElementById('alertBox');
            alertBox.textContent = message;
            alertBox.className = `alert alert-${type} show`;

            setTimeout(() => {
                alertBox.classList.remove('show');
            }, 3000);
        }

        function showLoading(show) {
            const loading = document.getElementById('loadingIndicator');
            const btn = document.getElementById('loginBtn');

            if (show) {
                loading.classList.add('show');
                btn.disabled = true;
                btn.style.opacity = '0.6';
            } else {
                loading.classList.remove('show');
                btn.disabled = false;
                btn.style.opacity = '1';
            }
        }

        function showConfigModal() {
            const modal = document.getElementById('configModal');
            const savedUrl = localStorage.getItem('apiUrl');

            if (savedUrl) {
                document.getElementById('configApiUrl').value = savedUrl;
            }

            modal.style.display = 'flex';
        }

        function closeConfigModal() {
            document.getElementById('configModal').style.display = 'none';
        }

        function saveConfig() {
            const apiUrl = document.getElementById('configApiUrl').value;
            const password = document.getElementById('configPassword').value;
            const passwordConfirm = document.getElementById('configPasswordConfirm').value;

            if (!apiUrl) {
                showAlert('Masukkan API URL', 'error');
                return;
            }

            if (password && password !== passwordConfirm) {
                showAlert('Password tidak cocok', 'error');
                return;
            }

            localStorage.setItem('apiUrl', apiUrl);

            if (password) {
                localStorage.setItem('dashboardPassword', password);
            }

            showAlert('Konfigurasi berhasil disimpan', 'success');
            closeConfigModal();
        }

        // Close modal when clicking outside
        window.addEventListener('click', (e) => {
            const modal = document.getElementById('configModal');
            if (e.target === modal) {
                closeConfigModal();
            }
        });
    </script>
</body>

</html>
